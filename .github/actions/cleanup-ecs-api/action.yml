name: 'Cleanup ECS API Preview'
description: 'Delete the ECS service + routing CFN stacks and per-identifier SSM params for a preview deployment.'

# Reusable across the rostering monorepo's ECS services. Callers supply
# service-name + project-name (defaults to "rostering") so stack names follow
# the convention `{project}-{service}-{identifier}` /
# `{project}-{service}-{identifier}-routing` produced by deploy-ecs-api.
#
# Replaces the legacy `cleanup-iam-api` composite (renamed 2026-05-29).

inputs:
  service-name:
    description: 'Service name (matches the deployer composite). E.g. iam-api'
    required: true
  project-name:
    description: 'Project prefix for stack names + SSM paths'
    required: false
    default: 'rostering'
  identifier:
    description: 'Deployment identifier to clean up (pr-42, etc.)'
    required: true
  environment:
    description: 'Target environment'
    required: false
    default: 'dev'
  aws-region:
    description: 'AWS region'
    required: false
    default: 'us-west-2'

runs:
  using: 'composite'
  steps:
    - name: Validate not cleaning up protected identifier
      shell: bash
      run: |
        case "${{ inputs.identifier }}" in
          main|prod|stable)
            echo "::error::Cannot clean up protected identifier '${{ inputs.identifier }}' via this action"
            exit 1
            ;;
        esac

    - name: Delete service stack
      shell: bash
      env:
        STACK_NAME: ${{ inputs.project-name }}-${{ inputs.service-name }}-${{ inputs.identifier }}
        REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        # delete-stack on a missing stack is a no-op that still returns 0, and
        # `wait stack-delete-complete` returns 0 once the stack is gone — but it
        # returns NON-ZERO on DELETE_FAILED/timeout. The previous `|| true` (plus
        # a trailing echo) swallowed that signal, so a stuck delete — the exact
        # thing that orphans an ALB target group — reported success. Surface it.
        if ! aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" >/dev/null 2>&1; then
          echo "Service stack $STACK_NAME not present — nothing to delete"
          exit 0
        fi
        echo "Deleting service stack: $STACK_NAME"
        aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
        if ! aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"; then
          echo "::error::Service stack $STACK_NAME did not reach DELETE_COMPLETE — see failed resources below"
          aws cloudformation describe-stack-events --stack-name "$STACK_NAME" --region "$REGION" \
            --query "reverse(StackEvents[?ResourceStatus=='DELETE_FAILED'].{Resource:LogicalResourceId,Reason:ResourceStatusReason})" \
            --output table || true
          exit 1
        fi
        echo "Service stack $STACK_NAME deleted"

    - name: Delete routing stack
      shell: bash
      env:
        STACK_NAME: ${{ inputs.project-name }}-${{ inputs.service-name }}-${{ inputs.identifier }}-routing
        REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        # See the service-stack step above: a DELETE_FAILED on the routing stack
        # leaves the target group + listener rule behind on the shared ALB, which
        # is what eventually trips its 100-target-group quota. Fail loudly.
        if ! aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" >/dev/null 2>&1; then
          echo "Routing stack $STACK_NAME not present — nothing to delete"
          exit 0
        fi
        echo "Deleting routing stack: $STACK_NAME"
        aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
        if ! aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"; then
          echo "::error::Routing stack $STACK_NAME did not reach DELETE_COMPLETE — see failed resources below"
          aws cloudformation describe-stack-events --stack-name "$STACK_NAME" --region "$REGION" \
            --query "reverse(StackEvents[?ResourceStatus=='DELETE_FAILED'].{Resource:LogicalResourceId,Reason:ResourceStatusReason})" \
            --output table || true
          exit 1
        fi
        echo "Routing stack $STACK_NAME deleted"

    - name: Clean up SSM parameters
      shell: bash
      env:
        PROJECT: ${{ inputs.project-name }}
        ENVIRONMENT: ${{ inputs.environment }}
        IDENTIFIER: ${{ inputs.identifier }}
      run: |
        # Remove per-identifier SSM params
        aws ssm delete-parameter \
          --name "/${PROJECT}/infra/${ENVIRONMENT}/${IDENTIFIER}/target-group-arn" \
          2>/dev/null || true
        echo "SSM parameters cleaned up"
