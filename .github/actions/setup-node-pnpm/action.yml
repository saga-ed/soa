name: 'Setup Node.js and pnpm'
description: 'Setup Node.js 22, pnpm, AWS OIDC, CodeArtifact auth, and install dependencies'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  aws-role-arn:
    description: 'AWS IAM role ARN for OIDC'
    required: true
  aws-region:
    description: 'AWS region'
    required: false
    default: 'us-west-2'
  cache-mode:
    description: 'pnpm store cache mode — save (first job) or restore (subsequent jobs). Ignored when skip-install=true.'
    required: false
    default: 'restore'
  skip-install:
    description: 'Skip pnpm install (for deploy jobs that only need CodeArtifact auth, not a full workspace)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    # Resolve the pnpm store path once so both cache steps can reference it.
    # Only needed when we're installing — deploy-only callers skip this.
    - name: Get pnpm store directory
      if: inputs.skip-install != 'true'
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Cache pnpm store (save)
      if: inputs.skip-install != 'true' && inputs.cache-mode == 'save'
      uses: actions/cache@v5
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Restore pnpm store cache
      if: inputs.skip-install != 'true' && inputs.cache-mode == 'restore'
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Configure CodeArtifact
      shell: bash
      env:
        CODEARTIFACT_DOMAIN: 'saga'
        CODEARTIFACT_OWNER: '531314149529'
      run: |
        CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
          --domain "$CODEARTIFACT_DOMAIN" \
          --domain-owner "$CODEARTIFACT_OWNER" \
          --query authorizationToken \
          --output text)

        # Register the token as a secret so subsequent steps' env: blocks show
        # `***` instead of the raw JWT in workflow logs. $GITHUB_ENV values
        # aren't auto-masked; pattern-match masking only kicks in once the
        # literal has been registered via ::add-mask::.
        echo "::add-mask::$CODEARTIFACT_AUTH_TOKEN"

        BASE_URL="${CODEARTIFACT_DOMAIN}-${CODEARTIFACT_OWNER}.d.codeartifact.${{ inputs.aws-region }}.amazonaws.com"

        # Set @saga-ed packages to use saga_js repository.
        npm config set @saga-ed:registry="https://${BASE_URL}/npm/saga_js/"

        # Auth token for both repositories (saga_js and upstream saga_nimbee).
        npm config set "//${BASE_URL}/npm/saga_js/:_authToken=$CODEARTIFACT_AUTH_TOKEN"
        npm config set "//${BASE_URL}/npm/saga_nimbee/:_authToken=$CODEARTIFACT_AUTH_TOKEN"

        # Export for Docker build (deploy workflows forward this into the build context).
        echo "CODEARTIFACT_AUTH_TOKEN=$CODEARTIFACT_AUTH_TOKEN" >> $GITHUB_ENV

    - name: Install dependencies
      if: inputs.skip-install == 'false'
      shell: bash
      run: NODE_ENV=development pnpm install --frozen-lockfile
