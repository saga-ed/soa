name: 'Setup saga-orch'
description: |
  Install the saga-platform CLI (saga-orch) from CodeArtifact. Replaces the
  old .github/scripts/orch-invoke.sh bash wrapper as the orchestrator client
  — saga-orch bakes in the no-retry/910s invoke config (program-hub#176) and
  emits the same one-line {ok:...} JSON envelope.

  Requires AWS credentials to already be configured (the CodeArtifact token
  fetch uses them). Idempotent: skips the install when saga-orch is already
  on PATH, so loops and multi-call jobs pay the ~15s install once.

inputs:
  saga-platform-version:
    description: |
      saga-platform CLI version to pin. Single source of truth: the reusable
      deploy workflow reads `vars.SAGA_PLATFORM_VERSION` (org/repo var) at the
      workflow level and threads it down here as an input, because `vars` is
      not reliably resolvable inside composite actions (no composite in this
      fleet references vars — they take values as inputs). Empty falls back to
      a sane default so a caller that has not set the var still gets a working
      pin.
    required: false
    default: '0.11.0'

runs:
  using: composite
  steps:
    - shell: bash
      env:
        SAGA_PLATFORM_VERSION: ${{ inputs.saga-platform-version }}
      run: |
        set -euo pipefail
        if command -v saga-orch >/dev/null 2>&1; then
          echo "saga-orch already installed: $(command -v saga-orch)"
          exit 0
        fi
        # Empty input (caller passed '' explicitly) falls back to the default
        # pin so the install never resolves to a bare `saga-platform`.
        VERSION="${SAGA_PLATFORM_VERSION:-0.11.0}"
        # Token fetch is capped + retried: a connect timeout to the
        # CodeArtifact control plane can hang for minutes and then
        # hard-fail the job (same hardening as the deploy workflows).
        TOKEN=""
        for attempt in 1 2 3 4 5; do
          if TOKEN=$(aws codeartifact get-authorization-token \
                --domain saga --domain-owner 531314149529 \
                --query authorizationToken --output text \
                --cli-connect-timeout 10 --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
            break
          fi
          TOKEN=""
          echo "::warning::CodeArtifact get-authorization-token failed (attempt ${attempt}/5)"
          sleep $((attempt * 5))
        done
        if [ -z "$TOKEN" ]; then
          echo "::error::Could not obtain a CodeArtifact auth token after 5 attempts"
          exit 1
        fi
        PIP_INDEX_URL="https://aws:${TOKEN}@saga-531314149529.d.codeartifact.us-west-2.amazonaws.com/pypi/saga_py/simple/" \
          pip install -q "saga-platform==${VERSION}"
        saga-orch --help >/dev/null
