name: 'Resolve Preview Mode'
description: |
  Single source of truth for deriving preview lifecycle decisions from a
  PR's labels (and optional workflow_call override). Replaces three near-
  identical copies of the same jq incantation across _deploy-ecs-api.yml,
  cleanup-preview-programs-api.yml, and cleanup-preview-scheduling-api.yml.

  Precedence: explicit `mode-input` > label `preview:keep-alive` > default
  `ephemeral`. The `preview:no-sleep` label is exposed as a separate output
  so callers can opt out of the daily sleep workflow independently.

inputs:
  labels-json:
    description: |
      JSON array of label objects from the calling workflow's PR context
      (typically passed as toJSON(github.event.pull_request.labels)).
      Empty string and `null` are treated as "no labels".
    required: true
  mode-input:
    description: |
      Optional explicit override, valid values: "", "ephemeral", "keep-alive".
      Empty = derive from labels.
    required: false
    default: ''

outputs:
  mode:
    description: '"ephemeral" or "keep-alive"'
    value: ${{ steps.resolve.outputs.mode }}
  keep-alive:
    description: 'true if the preview:keep-alive label is present'
    value: ${{ steps.resolve.outputs.keep-alive }}
  no-sleep:
    description: 'true if the preview:no-sleep label is present'
    value: ${{ steps.resolve.outputs.no-sleep }}
  skip-snapshot-check:
    description: |
      true when callers can safely teardown without snapshotting first
      (ephemeral mode). false in keep-alive mode where state must be
      preserved to S3 before container teardown.
    value: ${{ steps.resolve.outputs.skip-snapshot-check }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        LABELS_JSON: ${{ inputs.labels-json }}
        MODE_INPUT: ${{ inputs.mode-input }}
      run: |
        set -euo pipefail
        KEEP_ALIVE=$(printf '%s' "${LABELS_JSON:-[]}" | jq -r '
          (. // []) | map(.name) | any(. == "preview:keep-alive")')
        NO_SLEEP=$(printf '%s' "${LABELS_JSON:-[]}" | jq -r '
          (. // []) | map(.name) | any(. == "preview:no-sleep")')
        if [ -n "$MODE_INPUT" ]; then
          MODE="$MODE_INPUT"
        elif [ "$KEEP_ALIVE" = "true" ]; then
          MODE="keep-alive"
        else
          MODE="ephemeral"
        fi
        case "$MODE" in
          ephemeral|keep-alive) ;;
          *) echo "::error::invalid preview mode: $MODE"; exit 1 ;;
        esac
        if [ "$MODE" = "keep-alive" ]; then
          SKIP_SNAPSHOT_CHECK="false"
        else
          SKIP_SNAPSHOT_CHECK="true"
        fi
        echo "mode=$MODE" >> "$GITHUB_OUTPUT"
        echo "keep-alive=$KEEP_ALIVE" >> "$GITHUB_OUTPUT"
        echo "no-sleep=$NO_SLEEP" >> "$GITHUB_OUTPUT"
        echo "skip-snapshot-check=$SKIP_SNAPSHOT_CHECK" >> "$GITHUB_OUTPUT"
        echo "Preview mode: $MODE (keep-alive=$KEEP_ALIVE, no-sleep=$NO_SLEEP, skip-snapshot-check=$SKIP_SNAPSHOT_CHECK)"
