name: 'Deploy ECS API'
description: 'Build Docker image, push to ECR, and deploy to ECS via SAM. Service-agnostic — callers pass service identity + a CFN parameter-overrides JSON map.'

# Reusable across the saga-ed fleet's ECS services. Callers supply:
#   - service-name        (e.g., iam-api / sis-api)
#   - dockerfile-path     (apps/node/<service>/Dockerfile)
#   - samconfig-path      (infra/<service>/samconfig.yaml)
#   - routing-template-path (used only for the diff-vs-base-sha "skip if unchanged" check)
#   - service-parameter-overrides-json (CFN params for the service stack)
#   - extra-ssm-lookups   (optional, JSON map of {CfnParamName: ssmPath} for service-specific
#                          conditional params — e.g., iam-api's JWT signing CMK ARN. Empty
#                          SSM values tolerated and omitted from the overrides.)
#
# Originally the rostering `deploy-ecs-api` composite (renamed 2026-05-29 from
# `deploy-iam-api`); centralized into saga-ed/soa as the single shared deploy
# closure. ARM cluster/capacity/arch are now first-class inputs (arm defaults)
# instead of arriving only through samconfig + service-parameter-overrides-json.

inputs:
  service-name:
    description: 'Service name (used in stack names, image cache scope, etc.). E.g. iam-api'
    required: true
  project-name:
    description: 'Project prefix for stack names + SSM paths'
    required: false
    default: 'rostering'
  identifier:
    description: 'Deployment identifier (main, pr-42, etc.)'
    required: true
  environment:
    description: 'Target environment (dev or prod)'
    required: false
    default: 'dev'
  image-tag:
    description: 'Docker image tag (default: git SHA)'
    required: false
    default: ''
  prebuilt-image-uri:
    description: >
      Existing ECR image URI to deploy instead of building from source
      (sandbox redeploys of a registered switchboard variant). When set, all
      build steps are skipped; the image is validated against ECR before the
      service stack deploys it.
    required: false
    default: ''
  api-domain:
    description: 'API domain (wootdev.com or saga.org)'
    required: false
    default: 'wootdev.com'
  host-headers:
    description: 'Comma-separated list of host headers for the ALB routing rule. E.g. "iam.wootdev.com,rostering-api.wootdev.com"'
    required: true
  listener-rule-priority:
    description: 'ALB listener rule priority'
    required: false
    default: '400'
  preview-header:
    description: 'Preview identifier for x-saga-preview header routing (empty for main)'
    required: false
    default: ''
  ttl-days:
    description: 'TTL in days for preview cleanup'
    required: false
    default: '3'
  aws-region:
    description: 'AWS region'
    required: false
    default: 'us-west-2'
  dockerfile-path:
    description: 'Path to the service Dockerfile (build context = repo root)'
    required: true
  samconfig-path:
    description: 'Path to the SAM config file (e.g., infra/iam-api/samconfig.yaml)'
    required: true
  routing-template-path:
    description: 'Path to the routing-template.yaml (used by the "skip if unchanged" diff check)'
    required: true
  ecr-ssm-name:
    description: 'SSM parameter name for the ECR repo URI. E.g. /rostering/api/iam-api/ecr-repo-uri'
    required: true
  service-parameter-overrides-json:
    description: 'JSON map of CFN parameter overrides for the service stack. Each key/value becomes a SAM --parameter-overrides Key=Value pair. Empty string values are skipped.'
    required: false
    default: '{}'
  extra-ssm-lookups:
    description: 'JSON map of {CfnParamName: ssmPath} for opt-in SSM lookups that produce extra parameter overrides. Missing/empty SSM values are tolerated and omitted. Used for service-specific conditional params (iam-api: JWT/SVCCRED KMS ARNs).'
    required: false
    default: '{}'
  base-sha:
    description: 'Base SHA for routing-template diff (empty → always deploy routing)'
    required: false
    default: ''
  tg-ssm-scope:
    description: 'Service-scope segment inserted into the target-group SSM path, e.g. "sis-api/" for service-scoped projects. Empty (default) = iam-api''s unscoped /{project}/infra/{env}/{identifier}/target-group-arn. Mirrors the migrate-sg-ssm-path scoping input so a second service in the same project does not collide with iam-api on the shared param namespace.'
    required: false
    default: ''
  cluster-arn-ssm:
    description: >
      SSM parameter name the SERVICE stack reads for its ECS cluster ARN
      (wired into the service deploy as ClusterArnSSMParameter). ARM default:
      /dev/shared-arm/ecs-cluster-arn → the Graviton dev-shared cluster. This
      makes ARM a property of the shared workflow: onboarding a service gets
      arm for free; prod/x86 holdouts override. NB the default is dev-scoped —
      prod callers MUST override (e.g. /rostering/infra/prod/ecs-cluster-arn).
    required: false
    default: '/dev/shared-arm/ecs-cluster-arn'
  capacity-provider:
    description: >
      ECS capacity provider name the SERVICE stack uses (wired into the service
      deploy as CapacityProviderName). ARM default:
      dev-shared-ec2-cluster-arm-capacity-provider, which must be associated
      with the cluster named by cluster-arn-ssm. prod callers override.
    required: false
    default: 'dev-shared-ec2-cluster-arm-capacity-provider'
  cpu-architecture:
    description: >
      Task CPU architecture for the SERVICE stack (wired into the service
      deploy as CpuArchitecture). ARM default: ARM64. On capacity-provider
      (EC2) deploys this MUST match the cluster's instance arch — the
      dev-shared-arm cluster is Graviton, so ARM64 is the default.
    required: false
    default: 'ARM64'
  saga-platform-version:
    description: |
      saga-platform CLI version for the saga-deploy-routing install (single
      source: the workflow reads vars.SAGA_PLATFORM_VERSION and threads it
      here). Empty falls back to a sane default so the CLI install never
      resolves to a bare `saga-platform`.
    required: false
    default: '0.11.0'
  use-saga-deploy-routing:
    description: >
      When 'true', deploy the routing stack via the saga-platform
      `saga-deploy-routing` CLI (open-priority allocation: the CLI scans the
      shared ALB and claims a free listener-rule priority, ignoring the
      band-derived `listener-rule-priority` input). When 'false' (default),
      keep the legacy `sam deploy` with the caller-supplied band priority.
      Gated so iam-api can opt in without changing sis-api / sandbox behavior.
    required: false
    default: 'false'

outputs:
  api-url:
    description: 'Deployed API URL'
    value: ${{ steps.deploy-service.outputs.api-url }}
  image-uri:
    description: 'Docker image URI pushed to ECR'
    value: ${{ steps.image-uri.outputs.uri }}

runs:
  using: 'composite'
  steps:
    - name: Get ECR repo URI
      id: ecr
      if: inputs.prebuilt-image-uri == ''
      shell: bash
      env:
        ECR_SSM_NAME: ${{ inputs.ecr-ssm-name }}
      run: |
        ECR_URI=$(aws ssm get-parameter \
          --name "$ECR_SSM_NAME" \
          --query Parameter.Value --output text)
        echo "repo-uri=$ECR_URI" >> $GITHUB_OUTPUT

    # Opt-in SSM lookups for service-specific conditional CFN params. Missing
    # / empty values are tolerated and omitted from the final overrides — this
    # is how iam-api's JWT + service-credentials KMS ARNs are wired (they're
    # produced by the bootstrap stack; before that stack is redeployed they
    # don't exist yet, and the service template tolerates empty defaults).
    - name: Resolve extra SSM lookups
      id: extra-ssm
      shell: bash
      env:
        EXTRA_LOOKUPS: ${{ inputs.extra-ssm-lookups }}
      run: |
        EXTRA_PARAMS="{}"
        if [ -n "$EXTRA_LOOKUPS" ] && [ "$EXTRA_LOOKUPS" != "{}" ]; then
          # Iterate {paramName: ssmPath} entries. jq -r outputs `name<TAB>path`.
          while IFS=$'\t' read -r NAME SSM_PATH; do
            [ -z "$NAME" ] && continue
            VALUE=$(aws ssm get-parameter --name "$SSM_PATH" --query Parameter.Value --output text 2>/dev/null || echo "")
            if [ -n "$VALUE" ]; then
              EXTRA_PARAMS=$(echo "$EXTRA_PARAMS" | jq --arg k "$NAME" --arg v "$VALUE" '. + {($k): $v}')
            else
              echo "::warning::SSM lookup for ${NAME} (${SSM_PATH}) returned empty — omitting from parameter overrides"
            fi
          done < <(echo "$EXTRA_LOOKUPS" | jq -r 'to_entries[] | "\(.key)\t\(.value)"')
        fi
        # Emit as a single JSON line — captured into a Bash var downstream.
        echo "extra-params=$(echo "$EXTRA_PARAMS" | jq -c .)" >> "$GITHUB_OUTPUT"

    - name: Determine image tag
      id: tag
      if: inputs.prebuilt-image-uri == ''
      shell: bash
      run: |
        if [ -n "${{ inputs.image-tag }}" ]; then
          echo "tag=${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

    - name: Login to ECR
      if: inputs.prebuilt-image-uri == ''
      shell: bash
      run: |
        ACCOUNT_ID=$(echo "${{ steps.ecr.outputs.repo-uri }}" | cut -d. -f1)
        aws ecr get-login-password --region ${{ inputs.aws-region }} | \
          docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"

    # Register binfmt/QEMU so the amd64 runner can build the arm64 image for
    # the Graviton prod-shared cluster.
    - name: Set up QEMU
      if: inputs.prebuilt-image-uri == ''
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: inputs.prebuilt-image-uri == ''
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      id: build-push
      if: inputs.prebuilt-image-uri == ''
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        # prod-shared is Graviton/arm64 (CpuArchitecture=ARM64 in samconfig
        # prod) → single arm64 image. dev/preview build MULTI-ARCH
        # (amd64+arm64): the dev x86->arm migration moves services onto the
        # Graviton dev-shared-arm cluster ONE AT A TIME, so during the
        # transition different services in this same composite must be
        # placeable on EITHER the amd64 dev-shared OR the arm64
        # dev-shared-arm cluster. A multi-arch dev image runs on both, so each
        # service flips its CpuArchitecture/cluster pointers independently
        # without an arch-locked build dragging its siblings along. (Per-service
        # arch is selected by the CpuArchitecture CFN param the workflow passes
        # for dev — ECS pulls the matching manifest from the index.)
        platforms: ${{ inputs.environment == 'prod' && 'linux/arm64' || 'linux/amd64,linux/arm64' }}
        # provenance:false strips buildx's unknown/unknown attestation manifest
        # (which masquerades as a multi-arch index and trips the ECS agent).
        # Prod stays a single arm64 image; dev is a real 2-platform index.
        provenance: false
        push: true
        tags: ${{ steps.ecr.outputs.repo-uri }}:${{ steps.tag.outputs.tag }}
        # Delivered via BuildKit --secret so the token never lands in image
        # history (unlike build-args, which persist in layer metadata).
        secrets: |
          codeartifact=${{ env.CODEARTIFACT_AUTH_TOKEN }}
        # ECR registry cache (was type=gha,mode=max). Benchmarked on iam-api
        # (2026-06-11): registry,mode=min restores a warm build in ~3s — same as
        # gha when gha is healthy — but exports in ~50s vs mode=max's ~140-245s,
        # has no 10GB/repo GHA cap, is shared cross-runner, and avoids gha's
        # occasional transient restore-misses. Per-service scoping is automatic:
        # the buildcache tag lives in THIS service's own ECR repo. Per-ENV tag is
        # mandatory — dev builds a multi-arch (amd64+arm64) index, prod a single
        # arm64 image; one shared tag would poison the cache across the two build
        # shapes. The dev buildcache-dev ref holds BOTH arches under one manifest
        # list (mode=min,image-manifest=true,oci-mediatypes=true keeps the
        # per-platform cache blobs distinct), so multi-arch dev caches fine.
        #
        # PROD exports NO registry cache. Prod ECR repos are imageTagMutability:
        # IMMUTABLE, so the stable `buildcache-prod` ref cannot be overwritten on
        # the 2nd+ prod deploy — cache-export hard-fails the build (run
        # 27582034363). Prod deploys are rare, so the ~3s warm-cache restore buys
        # almost nothing there; we scope the registry cache to non-prod (which
        # keeps mutable/preview tags) and let prod cold-build. Decision (sds repo):
        # claude/projects/sds_80/decisions/d-prod-buildcache-immutable-tag-conflict.md
        # (Option A). NB: empty string MUST be the FALSE branch — `cond && '' || x`
        # always yields x in GH expressions (empty is falsy).
        cache-from: ${{ inputs.environment != 'prod' && format('type=registry,ref={0}:buildcache-{1}', steps.ecr.outputs.repo-uri, inputs.environment) || '' }}
        cache-to: ${{ inputs.environment != 'prod' && format('type=registry,ref={0}:buildcache-{1},mode=min,image-manifest=true,oci-mediatypes=true', steps.ecr.outputs.repo-uri, inputs.environment) || '' }}

    # Redeploy-existing-artifact path: no build — just confirm the image is
    # still in ECR (a lifecycle rule may have expired it long after the
    # variant was registered). Hard-fail here with a readable error instead
    # of letting the ECS deployment circuit-breaker time out on an
    # unpullable image.
    - name: Validate prebuilt image
      id: prebuilt
      if: inputs.prebuilt-image-uri != ''
      shell: bash
      env:
        IMAGE_URI: ${{ inputs.prebuilt-image-uri }}
      run: |
        set -euo pipefail
        case "$IMAGE_URI" in *@*)
          echo "::error::digest-pinned image URIs are not supported — pass <registry>/<repo>:<tag>"
          exit 1
        ;; esac
        REGISTRY_ID="${IMAGE_URI%%.*}"       # account id from the registry host
        PATH_PART="${IMAGE_URI#*/}"          # strip registry host
        REPO="${PATH_PART%:*}"               # repo name may contain slashes
        TAG="${PATH_PART##*:}"
        if [ "$PATH_PART" = "$REPO" ] || [ -z "$TAG" ] || [ -z "$REPO" ]; then
          echo "::error::prebuilt-image-uri '$IMAGE_URI' is not a <registry>/<repo>:<tag> ECR URI"
          exit 1
        fi
        case "$REGISTRY_ID" in *[!0-9]*|'')
          echo "::error::prebuilt-image-uri '$IMAGE_URI' does not start with an ECR registry host"
          exit 1
        ;; esac
        # --registry-id pins the lookup to the URI's account: without it the
        # same repo:tag existing in THIS account's registry would false-pass
        # for an image that actually lives in another account.
        # batch-get-image, NOT describe-images: the deploy role's ECRPush
        # policy grants pull/push actions only — ecr:DescribeImages is not
        # among them (verified live: AccessDeniedException). BatchGetImage
        # is, and answers the same exists?+digest question. NB it exits 0
        # with a miss reported in `failures[]`, so inspect the body.
        if ! RESP=$(aws ecr batch-get-image \
              --registry-id "$REGISTRY_ID" \
              --repository-name "$REPO" \
              --image-ids imageTag="$TAG" \
              --output json 2>&1); then
          echo "::error::ECR image check failed for ${IMAGE_URI}: ${RESP}"
          exit 1
        fi
        DIGEST=$(jq -r '.images[0].imageId.imageDigest // empty' <<<"$RESP")
        if [ -z "$DIGEST" ]; then
          FAILURE=$(jq -r '.failures[0].failureCode // "unknown"' <<<"$RESP")
          echo "::error::prebuilt image not found in ECR: ${IMAGE_URI} (${FAILURE}). The artifact may have been expired by an ECR lifecycle policy — rebuild the variant (push to its branch) or compose a fresher variant."
          exit 1
        fi
        echo "Image present: ${IMAGE_URI} (${DIGEST})"

    - name: Set image URI output
      id: image-uri
      shell: bash
      env:
        PREBUILT: ${{ inputs.prebuilt-image-uri }}
        BUILT: ${{ steps.ecr.outputs.repo-uri }}:${{ steps.tag.outputs.tag }}
      run: echo "uri=${PREBUILT:-$BUILT}" >> "$GITHUB_OUTPUT"

    - name: Install SAM CLI
      shell: bash
      run: pip install -q aws-sam-cli

    # Routing stack rarely changes — skip sam-deploy when the template and its
    # config haven't moved. For pr-*/new identifiers, always deploy (first run
    # has no stack). For main/stable, diff against base-sha.
    - name: Check if routing stack needs redeploy
      id: routing-diff
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        IDENTIFIER: ${{ inputs.identifier }}
        ROUTING_TEMPLATE: ${{ inputs.routing-template-path }}
        SAMCONFIG: ${{ inputs.samconfig-path }}
      run: |
        if [ "$IDENTIFIER" != "main" ] && [ "$IDENTIFIER" != "stable" ]; then
          echo "pr-* identifier — always deploy routing"
          echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
        fi
        if [ -z "$BASE_SHA" ]; then
          BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
        fi
        if [ -z "$BASE_SHA" ]; then
          echo "No base-sha — deploying routing"
          echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
        fi
        # Fetch base-sha if the shallow checkout didn't include it.
        git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
        # Two-dot range; three-dot (A...HEAD) needs merge base walking which
        # shallow history often can't do. Any diff failure → deploy (safe).
        if ! DIFF=$(git diff --name-only "$BASE_SHA" HEAD -- "$ROUTING_TEMPLATE" "$SAMCONFIG" 2>&1); then
          echo "::warning::routing diff failed ($DIFF) — deploying routing"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        elif [ -z "$DIFF" ]; then
          echo "routing-template + samconfig unchanged vs $BASE_SHA — skipping"
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "routing inputs changed vs $BASE_SHA — deploying"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    # ALB target-group names cap at 32 chars. Both rostering routing templates
    # derive ${ProjectName}-${ServiceName}-${Identifier}-tg (21 chars of fixed
    # prefix/suffix), which overflows once the identifier exceeds 11 chars —
    # true for any sandbox-<name> with a >3-char name. Compute a length-safe,
    # collision-resistant override here, shared by BOTH routing branches below:
    # ${ProjectName}-<svc>-<id[:13]>-<hash4> (14+13+1+4 = 32 max). The name
    # MUST keep the ${ProjectName}- prefix: the OIDC deploy role scopes
    # elasticloadbalancing:* to targetgroup/${ProjectName}-*/* (see
    # infra/github-oidc/dev-deploy-role-template.yaml) — a shorter prefix
    # fails CreateTargetGroup with AccessDenied. Empty output = the template
    # keeps the derived name, so existing short-identifier stacks (main,
    # pr-NN, sandbox-mp) see no TG replacement.
    - name: Compute length-safe target-group name
      id: tg-name
      if: steps.routing-diff.outputs.changed == 'true'
      shell: bash
      env:
        PROJECT: ${{ inputs.project-name }}
        SERVICE: ${{ inputs.service-name }}
        IDENTIFIER: ${{ inputs.identifier }}
      run: |
        TG_NAME=""
        if [ ${#IDENTIFIER} -gt 11 ]; then
          case "$SERVICE" in
            iam-api) SVC="iam" ;;
            sis-api) SVC="sis" ;;
            *) echo "::error::no short TG service token mapped for service '$SERVICE'"; exit 1 ;;
          esac
          HASH=$(printf '%s' "${PROJECT}-${SERVICE}-${IDENTIFIER}" | sha1sum | cut -c1-4)
          BODY=$(printf '%s' "$IDENTIFIER" | cut -c1-13 | sed 's/-*$//')
          TG_NAME="${PROJECT}-${SVC}-${BODY}-${HASH}"
        fi
        echo "tg-name=${TG_NAME}" >> "$GITHUB_OUTPUT"

    # Open-priority routing via the saga-platform CLI (opt-in, iam-api).
    # The CLI reads saga-init.yaml at the repo root, scans the shared ALB for a
    # free listener-rule priority, and deploys the routing stack — replacing the
    # band-derived `listener-rule-priority` input. Token is the same
    # CODEARTIFACT_AUTH_TOKEN the Build step already exported to $GITHUB_ENV via
    # setup-node-pnpm (no re-fetch). OIDC is OFF for iam-api -> --no-oidc.
    - name: Set up Python (saga-deploy-routing)
      if: steps.routing-diff.outputs.changed == 'true' && inputs.use-saga-deploy-routing == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Deploy routing stack (saga-deploy-routing)
      if: steps.routing-diff.outputs.changed == 'true' && inputs.use-saga-deploy-routing == 'true'
      shell: bash
      env:
        SERVICE: ${{ inputs.service-name }}
        IDENTIFIER: ${{ inputs.identifier }}
        ENVIRONMENT: ${{ inputs.environment }}
        HOST_HEADERS: ${{ inputs.host-headers }}
        TG_NAME: ${{ steps.tg-name.outputs.tg-name }}
        CODEARTIFACT_TOKEN: ${{ env.CODEARTIFACT_AUTH_TOKEN }}
        SAGA_PLATFORM_VERSION: ${{ inputs.saga-platform-version }}
      run: |
        # Install the published CLI from CodeArtifact (saga_py proxies PyPI, so
        # transitive deps like boto3 resolve through this one index). Version is
        # the single-source pin threaded from vars.SAGA_PLATFORM_VERSION; empty
        # falls back so the install never resolves to a bare `saga-platform`.
        VERSION="${SAGA_PLATFORM_VERSION:-0.11.0}"
        PIP_INDEX_URL="https://aws:${CODEARTIFACT_TOKEN}@saga-531314149529.d.codeartifact.us-west-2.amazonaws.com/pypi/saga_py/simple/" \
          pip install -q "saga-platform==${VERSION}"

        # CLI maps --config-env -> dev/prod; iam-api is dev-account previews.
        CONFIG_ENV="dev"
        [ "$ENVIRONMENT" = "prod" ] && CONFIG_ENV="prod"

        # Forward the full host-header set as a CFN param override. Without it,
        # the CLI derives a SINGLE host from saga-init.yaml (host_header =
        # rostering-api.wootdev.com) and passes it as HostHeader, clobbering the
        # routing-template's multi-host CommaDelimitedList default. That made
        # iam-api previews match ONLY rostering-api.wootdev.com, so login traffic
        # to iam.wootdev.com silently fell through to the main rule (priority 299)
        # — the sandbox was unreachable via the login flow. `host-headers` already
        # lists both names (it's the source of truth for the CFN-routing path),
        # so forwarding it makes the open-priority path agree. parse_param_overrides
        # splits each --param only on the first '=', so the comma-joined value
        # reaches CFN intact for the CommaDelimitedList HostHeader param.
        ROUTING_ARGS=( "${SERVICE}" "${IDENTIFIER}" --config-env "${CONFIG_ENV}" --no-oidc )
        if [ -n "${HOST_HEADERS}" ]; then
          ROUTING_ARGS+=( --param "HostHeader=${HOST_HEADERS}" )
        fi
        # Length-safe TG name for long sandbox identifiers (computed above;
        # empty for short identifiers → template derives the name).
        if [ -n "${TG_NAME}" ]; then
          ROUTING_ARGS+=( --param "TargetGroupName=${TG_NAME}" )
        fi
        # The CLI always injects the claimed priority under
        # `ListenerRulePriorityBase` (service mode hardcodes the param name in
        # saga-platform 0.9.0/0.10.0; --priority-param is infra-mode only). Each
        # service's routing-template must therefore accept that param — sis-api's
        # is bilingual (ListenerRulePriorityBase wins when set, else the legacy
        # ListenerRulePriority for the non-CLI main path).

        # X-Preview model is the CLI default (no --subdomain-previews). OIDC is
        # OFF for iam-api so only the base priority slot must be free (--no-oidc).
        # The CLI claims a free priority itself; the band input is ignored.
        saga-deploy-routing "${ROUTING_ARGS[@]}"

    - name: Deploy routing stack
      if: steps.routing-diff.outputs.changed == 'true' && inputs.use-saga-deploy-routing != 'true'
      shell: bash
      env:
        SAMCONFIG: ${{ inputs.samconfig-path }}
        PROJECT: ${{ inputs.project-name }}
        SERVICE: ${{ inputs.service-name }}
        IDENTIFIER: ${{ inputs.identifier }}
        HOST_HEADERS: ${{ inputs.host-headers }}
        PRIORITY: ${{ inputs.listener-rule-priority }}
        PREVIEW_HEADER: ${{ inputs.preview-header }}
        TG_NAME: ${{ steps.tg-name.outputs.tg-name }}
      run: |
        # SAM CLI rejects empty parameter values (`Key=`), so only pass
        # PreviewHeader when we have one. Main uses the template default ('').
        PARAMS=(
          "Identifier=${IDENTIFIER}"
          "HostHeader=${HOST_HEADERS}"
          "ListenerRulePriority=${PRIORITY}"
        )
        if [ -n "$PREVIEW_HEADER" ]; then
          PARAMS+=("PreviewHeader=${PREVIEW_HEADER}")
        fi

        # Length-safe TG name for long sandbox identifiers (computed in the
        # shared tg-name step above; empty for short identifiers → template
        # derives ${ProjectName}-${ServiceName}-${Identifier}-tg).
        if [ -n "${TG_NAME}" ]; then
          PARAMS+=("TargetGroupName=${TG_NAME}")
        fi

        sam deploy \
          --config-file "$SAMCONFIG" \
          --config-env routing \
          --stack-name "${PROJECT}-${SERVICE}-${IDENTIFIER}-routing" \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --parameter-overrides "${PARAMS[@]}"

    - name: Deploy service stack
      id: deploy-service
      shell: bash
      env:
        SAMCONFIG: ${{ inputs.samconfig-path }}
        PROJECT: ${{ inputs.project-name }}
        SERVICE: ${{ inputs.service-name }}
        ENVIRONMENT: ${{ inputs.environment }}
        IDENTIFIER: ${{ inputs.identifier }}
        IMAGE_URI: ${{ steps.image-uri.outputs.uri }}
        TTL_DAYS: ${{ inputs.ttl-days }}
        HOST_HEADERS: ${{ inputs.host-headers }}
        SERVICE_PARAMS_JSON: ${{ inputs.service-parameter-overrides-json }}
        EXTRA_PARAMS_JSON: ${{ steps.extra-ssm.outputs.extra-params }}
        TG_SSM_SCOPE: ${{ inputs.tg-ssm-scope }}
        # ARM cluster/capacity/arch knobs (arm defaults set in inputs).
        CLUSTER_ARN_SSM: ${{ inputs.cluster-arn-ssm }}
        CAPACITY_PROVIDER: ${{ inputs.capacity-provider }}
        CPU_ARCHITECTURE: ${{ inputs.cpu-architecture }}
      run: |
        DATETIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Universal CFN parameters (every ECS service deploy needs these).
        PARAMS=(
          "Identifier=${IDENTIFIER}"
          "ImageArn=${IMAGE_URI}"
          "TargetGroupArnSSMParameter=/${PROJECT}/infra/${ENVIRONMENT}/${TG_SSM_SCOPE}${IDENTIFIER}/target-group-arn"
          "DeploymentDatetime=${DATETIME}"
          "TtlDays=${TTL_DAYS}"
        )

        # Caller-supplied CFN params come from TWO sources, both processed first
        # so we can let them WIN over the workflow's arm defaults deterministically
        # (rather than relying on SAM's undefined dup-key precedence). Build a set
        # of keys the caller already provided as we append.
        declare -A CALLER_KEYS=()
        append_json() {
          local json="$1"
          [ -z "$json" ] && return 0
          [ "$json" = "{}" ] && return 0
          # Empty values are skipped because SAM rejects `Key=`.
          while IFS=$'\t' read -r KEY VAL; do
            [ -z "$KEY" ] && continue
            [ -z "$VAL" ] && continue
            PARAMS+=("${KEY}=${VAL}")
            CALLER_KEYS["$KEY"]=1
          done < <(echo "$json" | jq -r 'to_entries[] | "\(.key)\t\(.value)"')
        }
        # Service-specific CFN params from the caller's JSON map (incl. the per-PR
        # DB secret ARNs the workflow merged in). Then SSM-derived overrides.
        append_json "$SERVICE_PARAMS_JSON"
        append_json "$EXTRA_PARAMS_JSON"

        # ARM cluster/capacity/arch: workflow-level inputs with arm defaults,
        # mapped onto the service-template's ClusterArnSSMParameter /
        # CapacityProviderName / CpuArchitecture params.
        #
        # CONTRACT — read this before onboarding a service:
        #   1. These DEFAULTS SUPERSEDE samconfig. A SAM CLI --parameter-overrides
        #      value wins over the same key in samconfig's parameter_overrides, so
        #      a service whose samconfig pins an x86 cluster is silently moved to
        #      the arm cluster unless it overrides these inputs. That is the point
        #      ("arm is a property of the shared workflow"): to stay x86, the
        #      CALLER sets cluster-arn-ssm/capacity-provider/cpu-architecture (or
        #      passes them in service-parameter-overrides-json — see #2). prod
        #      callers MUST override (the defaults are dev-scoped).
        #   2. A caller that passes any of these THREE keys in
        #      service-parameter-overrides-json (or extra-ssm-lookups) WINS: we
        #      skip the arm default for a key the caller already supplied, so there
        #      is exactly one value per key (no SAM dup-key gamble).
        #   3. The consumer's service-template MUST DECLARE all three params. The
        #      saga ECS-on-shared-cluster service-template (iam-api / authz-sync)
        #      does. A template missing one would make CloudFormation reject the
        #      deploy ("Parameters [X] do not exist"); such a service must override
        #      the missing input to '' to suppress injection.
        # Empty input value also suppresses injection (SAM rejects `Key=`).
        [ -n "$CLUSTER_ARN_SSM" ]   && [ -z "${CALLER_KEYS[ClusterArnSSMParameter]:-}" ] && PARAMS+=("ClusterArnSSMParameter=${CLUSTER_ARN_SSM}")
        [ -n "$CAPACITY_PROVIDER" ] && [ -z "${CALLER_KEYS[CapacityProviderName]:-}" ]   && PARAMS+=("CapacityProviderName=${CAPACITY_PROVIDER}")
        [ -n "$CPU_ARCHITECTURE" ]  && [ -z "${CALLER_KEYS[CpuArchitecture]:-}" ]         && PARAMS+=("CpuArchitecture=${CPU_ARCHITECTURE}")

        # Stack-name suffix is env-aware. The live PROD service stack was
        # created by the manual `sam deploy --config-env prod` revival as
        # <project>-<service>-prod (samconfig prod stanza pins that name),
        # while the live DEV mainline stack genuinely is
        # <project>-<service>-main (this composite's historical dev naming).
        # Emit -prod for prod so CI UPDATES the live -prod stack in place;
        # keep -<identifier> (main/pr-N/sandbox) for dev. Dropping the
        # suffix entirely would switch dev to <project>-<service>-dev — a
        # NEW stack, orphaning the live dev one. Decision (sds repo):
        # claude/projects/sds_80/decisions/prod-ci-stack-name-conflict.md.
        STACK_SUFFIX="${IDENTIFIER}"
        [ "$ENVIRONMENT" = "prod" ] && STACK_SUFFIX="prod"

        sam deploy \
          --config-file "$SAMCONFIG" \
          --config-env "$ENVIRONMENT" \
          --stack-name "${PROJECT}-${SERVICE}-${STACK_SUFFIX}" \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --parameter-overrides "${PARAMS[@]}"

        echo "api-url=https://${HOST_HEADERS}" >> $GITHUB_OUTPUT

    # Service stabilization moved to a dedicated `wait-stable` job in
    # .github/workflows/deploy-ecs-api.yml so it can run in parallel with
    # other post-deploy jobs (migrate, PR comment phase 1) and be visible as
    # its own required check in branch rulesets.
