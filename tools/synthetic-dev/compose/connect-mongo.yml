## connect-mongo — Connect's dedicated MongoDB for the synthetic-dev stack.
##
## OWNED BY synthetic-dev (up.sh connect_infra_up), deliberately INDEPENDENT of:
##   - infra/compose/services/mongo (the legacy saga-api/wootmath fixture mongo —
##     legacy tech; new services must not couple to it), and
##   - qboard's own docker-compose.yml mongo (mongo:7 + root auth on :27017 —
##     the bespoke container Connect grew in isolation; being retired in favor
##     of this one, see the qboard-mongo-alignment follow-up).
##
## Posture: standalone (no replica set — connect-api uses no transactions or
## change streams), NO auth (soa local-dev convention), bound to loopback on a
## NON-DEFAULT host port (27037) so it never contends with a default-port mongo
## (qboard-mongo, another stack, a system mongod).
##
## connect-api connects via:  mongodb://localhost:27037/connectv3
## (the db name comes from connect-api's MONGO_DB_NAME default `connectv3`,
## not the URI path — keep them matching). Collections are created on first
## write — no migrations, no seed fixtures.
##
## Usage (up.sh does this for you):
##   docker compose -f compose/connect-mongo.yml up -d
##   docker compose -f compose/connect-mongo.yml down        # data survives
##   docker volume rm connect-mongo-data                     # full reset

services:
    connect-mongo:
        image: mongo:7
        container_name: connect-mongo
        restart: unless-stopped
        ports:
            # Loopback only — no remote access to the dev machine.
            - "127.0.0.1:27037:27017"
        volumes:
            - connect-mongo-data:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping: 1}).ok"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s

volumes:
    connect-mongo-data:
        name: connect-mongo-data
